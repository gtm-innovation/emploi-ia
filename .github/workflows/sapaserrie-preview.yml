name: Sapaserrie — Preview Deploy

on:
  push:
    branches: ["claude/sapaserrie-3d-hero-LrvuE"]
    paths: ["sapaserrie/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sapaserrie/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sapaserrie

      - name: Build
        run: npm run build
        working-directory: sapaserrie

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sapaserrie/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
